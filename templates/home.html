<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="10">
    <title>Technopired</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            /* background: linear-gradient(135deg, #2b5876, #4e4376); */
            background-image: url("https://img.freepik.com/premium-vector/hand-drawn-dark-background-back-school-with-portfolio-watches-school-supplies_638892-196.jpg");
            background-size: 100% 100vh;
            color: white;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .navbar {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }
        .title {
            color: #00eaff;
            font-size: 22px;
            margin-left: 15px;
            font-weight: bold;
            text-shadow: 0px 0px 10px #00eaff;
        }
        .logout-btn {
            margin-right: 15px;
            padding: 8px 15px;
            background: #ff3b3b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
            text-decoration: none;
        }
        .logout-btn:hover {
            background: #e22b2b;
        }

        /* Welcome Title Animation */
        .welcome-title {
            margin-top: 100px;
            font-size: 40px;
            font-weight: bold;
            text-shadow: 3px 3px 10px rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .welcome-title span {
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInLetter 5s 10s forwards;
            font-weight: bold;
            font-size: 50px;
            background: linear-gradient(45deg, #ff0000, #ff7300, #ffeb3b, #4caf50, #2196f3, #9c27b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 10px rgba(255, 255, 255, 0.6);
        }

        @keyframes fadeInLetter {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .content {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 30px;
            margin-top: 30px;
            padding: 20px;
        }
        .block {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            width: 300px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .block:hover {
            transform: translateY(-5px);
            box-shadow: 0px 4px 10px rgba(255, 255, 255, 0.2);
        }
        .block img {
            width: 100%;
            height: 200px;
            border-radius: 10px;
        }
        .block a {
            margin-top: 15px;
            padding: 10px 15px;
            width: 100%;
            background: #ffeb3b;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
            text-decoration: none;
        }
        .block a:hover {
            background: #fbc02d;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="title">Technopired</div>
        <div>
            <a href="/home" class="logout-btn">Home</a>
            <a class="logout-btn" href="/">Logout</a>
        </div>
    </div>

    <h1 class="welcome-title"></h1>

    <div class="content">
        <div class="block">
            <img src="https://i.pinimg.com/1200x/4a/09/21/4a092159cfef0fc9af903d9ef851d7c8.jpg" alt="Image 1">
            <a href="/texttospeech">Text To Speech</a>
        </div>
        <div class="block">
            <img src="https://img3.wallspic.com/crops/5/2/9/3/7/173925/173925-hand_palm-hand-gesture-finger-thumb-720x1280.png" alt="Image 1">
            <a href="/gesture">Gesture To Voice</a>
        </div>
        <div class="block">
            <img src="https://img.freepik.com/premium-vector/vector-button-numbers-1-10-very-suitable-complementary-designs-candidate-campaign-numbers_436207-80.jpg" alt="Image 1">
            <a href="/eyeblink">Number Game</a>
        </div>
    </div>

    <script>

        // Title Animation - Display One Letter at a Time
        function animateTitle() {
            const text = "W E L C O M E";
            const titleElement = document.querySelector(".welcome-title");

            titleElement.innerHTML = "";
            text.split("").forEach((char, index) => {
                let span = document.createElement("span");
                span.textContent = char;
                span.style.marginRight = '20px';
                span.style.animationDelay = `${index * 0.1}s`;
                titleElement.appendChild(span);
            });
        }

        window.onload = animateTitle;
    </script>

</body>
</html>
